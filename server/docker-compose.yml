# FILE: docker-compose.yml

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: rag_db
      POSTGRES_HOST_AUTH_METHOD: password
    ports:
      - "6543:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis/redis-stack-server:latest
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # 🚨 NEW: Neo4j Graph Database
  neo4j:
    image: neo4j:5.15.0
    restart: unless-stopped
    ports:
      - "7474:7474" # HTTP Browser UI
      - "7687:7687" # Bolt Protocol (Driver)
    environment:
      NEO4J_AUTH: neo4j/adminpassword # Set your password here
    volumes:
      - neo4j_data:/data

volumes:
  qdrant_data:
  postgres_data:
  redis_data:
  neo4j_data: